YAML
name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: brew install xcodegen
        
      - name: Build IPA
        run: |
          chmod +x dev.sh
          # Eğer dev.sh çalışırken hata verirse, burada logları görebiliriz
          ./dev.sh
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenDIHM-IPA
          path: build/*.ipa
