name: OpenDIHM
options:
  deploymentTarget:
    iOS: "18.0"
  bundleIdPrefix: com.opendihm
  createIntermediateGroups: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "A6SPCT43F8"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only

targets:
  OpenDIHM:
    type: application
    platform: iOS
    sources:
      - Sources/OpenDIHM
    info:
      path: Sources/OpenDIHM/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "OpenDIHM needs to connect to the microscope on your local network."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.opendihm.mobile-ios
        INFOPLIST_FILE: Sources/OpenDIHM/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/OpenDIHM/Resources/OpenDIHM.entitlements
